services:
  load_balancer:
    container_name: loadbalancer
    image: traefik:v3.6
    restart: unless-stopped
    tty: true
    command:
      # EntryPoints
      - --entrypoints.http.address=:80
      - --entrypoints.ping.address=:8081
      - --entrypoints.metrics.address=:8082
      - --entrypoints.traefik.address=:8083

      # Providers 
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      
      # API & Dashboard 
      - --api.dashboard=true
      - --api.insecure=true
      
      # Ping endpoint
      - --ping=true
      - --ping.entrypoint=ping
      
      # Observability 
      - --log.level=INFO
      - --accesslog=true
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --metrics.prometheus.addServicesLabels=true

      # Timeouts
      - --serversTransport.forwardingTimeouts.dialTimeout=10s
      - --serversTransport.forwardingTimeouts.responseHeaderTimeout=10s
      
      # Load Balancing
      - --providers.docker.defaultRule=Host(`localhost`)
    labels:
      - traefik.enable=true
      
      # Dashboard
      - traefik.http.routers.dashboard.rule=Host(`localhost`)
      - traefik.http.routers.dashboard.entrypoints=traefik
      - traefik.http.routers.dashboard.service=api@internal
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ping >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      - api
    links:
      - api
    ports:
      - "8080:80"
      - "127.0.0.1:8081:8081"
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8083:8083"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - url-shortener-service-public
      - url-shortener-service-internal
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 2048M
        reservations:
          cpus: '2'
          memory: 1024M

  api:
    image: url-shortener-api:latest
    restart: unless-stopped
    build:
      context: ../../src
      dockerfile: ./Dockerfile
    env_file:
      - .env
    labels:
      - traefik.enable=true

      # Router configuration
      - traefik.http.routers.api_service_read.entrypoints=http
      - traefik.http.routers.api_service_read.rule=PathPrefix(`/url-shortener`)

      # Service configuration
      - traefik.http.services.api_service_read.loadbalancer.server.port=8080
      - traefik.http.services.api_service_read.loadbalancer.passhostheader=true
      - traefik.http.services.api_service_read.loadbalancer.healthcheck.path=/health?source=traefik
      - traefik.http.services.api_service_read.loadbalancer.healthcheck.interval=15s
      - traefik.http.services.api_service_read.loadbalancer.healthcheck.timeout=3s
      - traefik.http.services.api_service_read.loadbalancer.healthcheck.scheme=http

      # Middlewares definitions
      - traefik.http.middlewares.strip-prefix.stripprefix.prefixes=/url-shortener
      - traefik.http.middlewares.compress.compress=true
      - traefik.http.middlewares.rate-limit.ratelimit.average=100000
      - traefik.http.middlewares.rate-limit.ratelimit.burst=5000
      - traefik.http.middlewares.rate-limit.ratelimit.period=1s
      - traefik.http.middlewares.circuit-breaker.circuitbreaker.expression=LatencyAtQuantileMS(95.0) > 5000

      # Apply middlewares
      - traefik.http.routers.api_service_read.middlewares=strip-prefix,compress,rate-limit,circuit-breaker
    networks:
      - url-shortener-service-internal
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      replicas: 1
      mode: replicated
      resources:
        limits:
          cpus: '1'
          memory: '512M'
          pids: 100
        reservations:
          cpus: '1'
          memory: '512M'

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:19090:9090"
    networks:
      - url-shortener-service-internal
      - url-shortener-service-public
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/ready >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./prometheus/prometheus-config.yml:/etc/prometheus/prometheus.yml
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.50'
          memory: 256M

  otel-collector:
    container_name: otel_collector
    image: otel/opentelemetry-collector:latest
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector.yaml" ]
    networks:
      - url-shortener-service-internal
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.50'
          memory: 256M

  tempo:
    container_name: tempo
    image: grafana/tempo:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
    networks:
      - url-shortener-service-internal
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.50'
          memory: 256M

  datadog-agent:
    image: registry.datadoghq.com/agent:7
    environment:
      - DD_API_KEY=e896ffc8204e1738a01594893612be6c
      - DD_SITE=us5.datadoghq.com
      - DD_ENV=dev
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_APM_IGNORE_RESOURCES="GET /health,GET /metrics,GET /metrics-open"
    networks:
      - url-shortener-service-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

networks:
  url-shortener-service-public:
    driver: bridge
  url-shortener-service-internal:
    driver: bridge
    internal: true